name: Dependency Review

on:
  pull_request:
    paths:
      - "package.json"
      - "package-lock.json"
      - "rust/Cargo.toml"
      - "rust/Cargo.lock"
      - "examples/rust/Cargo.toml"
      - "examples/rust/Cargo.lock"
      - ".github/dependabot.yml"
      - ".github/workflows/**"

permissions:
  contents: read
  pull-requests: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/dependency-review-action@v5
