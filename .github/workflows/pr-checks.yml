name: PR Checks

on:
  pull_request:
    paths:
      - '.github/dependabot.yml'
      - '.github/workflows/**'
      - 'package.json'
      - 'package-lock.json'
      - 'rust/**'
      - 'scripts/**'
  pull_request_review:
    types: [submitted]

jobs:
  test-and-build:
    if: github.event_name == 'pull_request' || (github.event.review && (github.event.review.state == 'approved' || contains(github.event.review.body, '/check')))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
        with:
          submodules: 'recursive'
      - uses: actions/setup-node@v1
        with:
          node-version: '18'
      - name: Cache node modules
        uses: actions/cache@v3
        with:
          path: ~/.npm # npm cache files are stored in `~/.npm` on Linux/macOS
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-
            ${{ runner.os }}-build-
            ${{ runner.os }}-
      - name: prepare-rust
        run: |
          rustup install stable
          rustup target add wasm32-unknown-unknown --toolchain stable
          curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: install
        run: |
          npm install
      - name: test:package-helper
        run: |
          npm run test:package-helper
      - name: test:package-asm-fixture
        run: |
          npm run test:package-asm-fixture
      - name: rust:test
        run: |
          npm run rust:test
      - name: test:package-nodejs
        run: |
          npm run test:package-nodejs
      - name: test:package-browser
        run: |
          npm run test:package-browser
  check-warns:
    if: github.event_name == 'pull_request' || (github.event.review && (github.event.review.state == 'approved' || contains(github.event.review.body, '/check')))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
        with:
          submodules: 'recursive'
      - uses: actions/setup-node@v1
        with:
          node-version: '18'
      - name: Cache node modules
        uses: actions/cache@v3
        with:
          path: ~/.npm # npm cache files are stored in `~/.npm` on Linux/macOS
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-
            ${{ runner.os }}-build-
            ${{ runner.os }}-
      - name: prepare-rust
        run: |
          rustup install stable
          rustup target add wasm32-unknown-unknown --toolchain stable
          curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: rust:check-warnings
        run: |
          npm run rust:check-warnings
