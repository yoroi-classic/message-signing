name: PR Checks

on:
  pull_request:
    paths:
      - '.github/dependabot.yml'
      - '.github/workflows/**'
      - '.nvmrc'
      - 'package.json'
      - 'package-lock.json'
      - 'rust-toolchain.toml'
      - 'rust/**'
      - 'scripts/**'
  pull_request_review:
    types: [submitted]

jobs:
  test-and-build:
    if: github.event_name == 'pull_request' || (github.event.review && (github.event.review.state == 'approved' || contains(github.event.review.body, '/check')))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: 'recursive'
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - name: setup npm
        run: |
          corepack enable npm
          corepack prepare npm@10.9.7 --activate
          npm --version
      - name: Cache cargo tools
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/bin/wasm-pack
            ~/.cargo/git
            ~/.cargo/registry
          key: ${{ runner.os }}-cargo-tools-${{ hashFiles('rust-toolchain.toml', 'scripts/install-wasm-pack.sh', 'scripts/wasm-build.sh') }}
      - name: prepare-rust
        run: |
          rustup show
          npm run setup:wasm-pack
      - name: install
        run: |
          npm ci
      - name: test:package-helper
        run: |
          npm run test:package-helper
      - name: test:package-asm-fixture
        run: |
          npm run test:package-asm-fixture
      - name: rust:test
        run: |
          npm run rust:test
      - name: test:package-nodejs
        run: |
          npm run test:package-nodejs
      - name: test:package-browser
        run: |
          npm run test:package-browser
  check-warns:
    if: github.event_name == 'pull_request' || (github.event.review && (github.event.review.state == 'approved' || contains(github.event.review.body, '/check')))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: 'recursive'
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - name: setup npm
        run: |
          corepack enable npm
          corepack prepare npm@10.9.7 --activate
          npm --version
      - name: Cache cargo registry
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('rust/Cargo.lock', 'rust-toolchain.toml') }}
      - name: prepare-rust
        run: |
          rustup show
      - name: rust:check-warnings
        run: |
          npm run rust:check-warnings
